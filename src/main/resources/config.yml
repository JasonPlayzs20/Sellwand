# SimpleSellWand
# Usage: sneak + right-click a supported container with a normal stick.

# Only main-hand interaction is processed to avoid duplicate sells.
wand-material: STICK
require-sneak: true

# Containers that can be sold from.
# Use SHULKER_BOXES to allow all dyed shulker boxes.
allowed-containers:
  - CHEST
  - TRAPPED_CHEST
  - BARREL
  - SHULKER_BOXES
  - COPPER_CHEST
  - WAXED_COPPER_CHEST
  - EXPOSED_COPPER_CHEST
  - WAXED_EXPOSED_COPPER_CHEST
  - WEATHERED_COPPER_CHEST
  - WAXED_WEATHERED_COPPER_CHEST
  - OXIDISED_COPPER_CHEST
  - WAXED_OXIDISED_COPPER_CHEST

# If enabled, shulker box items inside a supported container are opened virtually,
# and their internal contents are included in the same EconomyShopGUI sell calculation.
# The shulker box item itself is kept; only sellable contents are removed.
sell-shulker-contents: true

# EconomyShopGUI economy type to pay through Vault.
# This plugin intentionally only supports Vault payouts.
economy-type: VAULT

# Minimum delay between uses per player, in milliseconds.
cooldown-ms: 750

# First right-click asks for confirmation. Right-click the same container again before
# this timeout expires to sell it.
confirm-sell: true
confirm-timeout-ms: 10000

# Handling Fee, in percentage
handling-fee: 5

messages:
  prefix: "&8[&aSellWand&8] &r"
  no-permission: "&cYou do not have permission to use this sell wand."
  invalid-container: "&cThis block is not a supported sell container."
  confirm-sell: "&eRight-click this container again within {seconds} seconds to confirm the sale."
  no-items: "&eThere are no items in this container that can be sold right now."
  sold: "&aSold &f{amount}&a item(s) for &f{money}&a."
  cooldown: "&ePlease wait before using the sell wand again."
  vault-error: "&cVault payment failed. Nothing was removed."
  reloaded: "&aSimpleSellWand config reloaded."
  fee-applied: "&aHandling fee of &f{fee}&a applied."
